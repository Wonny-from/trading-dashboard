<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wonny 매매일지</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; padding: 2rem; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 6px; color: #111; }
  .subtitle { font-size: 13px; color: #999; margin-bottom: 2rem; }
  .section-label { font-size: 11px; font-weight: 500; color: #999; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; }
  .metric-grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .metric { background: #ebebea; border-radius: 8px; padding: 14px 16px; }
  .metric-label { font-size: 12px; color: #888; margin-bottom: 6px; }
  .metric-value { font-size: 20px; font-weight: 500; color: #111; }
  .metric-sub { font-size: 11px; color: #aaa; margin-top: 4px; }
  .pos { color: #1D9E75; } .neg { color: #D85A30; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 1.5rem; }
  .card { background: #fff; border: 0.5px solid #e0e0de; border-radius: 12px; padding: 16px; }
  .card-full { background: #fff; border: 0.5px solid #e0e0de; border-radius: 12px; padding: 16px; margin-bottom: 1.5rem; }
  .card-title { font-size: 13px; font-weight: 500; color: #111; margin-bottom: 14px; }
  .legend-row { display: flex; gap: 14px; margin-bottom: 10px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #888; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
  .tbl th { font-size: 11px; font-weight: 500; color: #999; text-align: left; padding: 6px 10px; border-bottom: 0.5px solid #eee; white-space: nowrap; }
  .tbl td { padding: 8px 10px; border-bottom: 0.5px solid #f3f3f3; color: #333; white-space: nowrap; }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl tbody tr:hover { background: #fafafa; }
  .badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 20px; }
  .badge-kr { background: #E6F1FB; color: #185FA5; }
  .badge-us { background: #FAEEDA; color: #633806; }
  .badge-hold { background: #EAF3DE; color: #27500A; }
  .badge-sold { background: #F1EFE8; color: #5F5E5A; }
  .status-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 1.5rem; padding: 10px 14px; background: #ebebea; border-radius: 8px; font-size: 12px; color: #888; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .refresh-btn { margin-left: auto; background: transparent; border: 0.5px solid #ccc; color: #888; padding: 4px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; }
  .refresh-btn:hover { background: #e5e5e5; color: #333; }
  .highlight { background: #f0f7ff; border: 0.5px solid #c5ddf7; }
  @media (max-width: 768px) {
    body { padding: 1rem; }
    .metric-grid-5 { grid-template-columns: repeat(2, 1fr); }
    .charts-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<h1>Wonny 매매일지</h1>
<p class="subtitle" id="lastUpdate">데이터 불러오는 중...</p>

<div class="status-bar">
  <div class="status-dot" style="background:#BA7517;" id="sDot"></div>
  <span id="sTxt">구글 시트 연결 중...</span>
  <button class="refresh-btn" onclick="run()">새로고침</button>
</div>

<p class="section-label">포트폴리오 요약</p>
<div class="metric-grid-5">
  <div class="metric highlight"><div class="metric-label">총 자산</div><div class="metric-value" id="m-assets">—</div><div class="metric-sub" id="m-assets-sub"></div></div>
  <div class="metric"><div class="metric-label">총 투자금액</div><div class="metric-value" id="m-total">—</div><div class="metric-sub" id="m-hold"></div></div>
  <div class="metric"><div class="metric-label">보유 현금</div><div class="metric-value" id="m-cash">—</div><div class="metric-sub" id="m-cash-sub"></div></div>
  <div class="metric"><div class="metric-label">실현 손익</div><div class="metric-value" id="m-pnl">—</div><div class="metric-sub" id="m-pct"></div></div>
  <div class="metric"><div class="metric-label">승률</div><div class="metric-value" id="m-win">—</div><div class="metric-sub" id="m-winsub"></div></div>
</div>

<div class="charts-row">
  <div class="card">
    <div class="card-title">보유 종목별 투자금액</div>
    <div class="legend-row">
      <div class="legend-item"><div class="legend-dot" style="background:#378ADD;"></div>국장</div>
      <div class="legend-item"><div class="legend-dot" style="background:#EF9F27;"></div>미장</div>
    </div>
    <div style="position:relative;height:220px;"><canvas id="retChart"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title">자산 구성</div>
    <div id="mktLegend" class="legend-row"></div>
    <div style="position:relative;height:220px;"><canvas id="mktChart"></canvas></div>
  </div>
</div>

<div class="card-full">
  <div class="card-title">매매 내역</div>
  <div style="overflow-x:auto;">
    <table class="tbl">
      <thead><tr>
        <th>종목</th><th>시장</th><th>매수일</th><th>매수가</th><th>수량</th>
        <th>매수금액</th><th>매도일</th><th>손익</th><th>수익률</th><th>상태</th>
      </tr></thead>
      <tbody id="tbody"><tr><td colspan="10" style="text-align:center;padding:2rem;color:#bbb;">불러오는 중...</td></tr></tbody>
    </table>
  </div>
</div>

<script>
const TRADE_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRgDk4qNXL-ByfHEPG7pwnK8Zz96-IPU5GlC0D_kFipnAkKiBtSIvyQsnZWZ0uofAA51iqxOCsZ2-_W/pub?gid=512959016&single=true&output=csv';
const CASH_CSV  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRgDk4qNXL-ByfHEPG7pwnK8Zz96-IPU5GlC0D_kFipnAkKiBtSIvyQsnZWZ0uofAA51iqxOCsZ2-_W/pub?gid=2018962040&single=true&output=csv';

const fmtA = v => { const x=Number(v); return (isNaN(x)||v===''||v===null)?'—':Math.round(x).toLocaleString('ko-KR')+'원'; };
const fmtW = v => { const x=Number(v); return (isNaN(x)||v===''||v===null)?'—':(x>=0?'+':'')+Math.round(x).toLocaleString('ko-KR')+'원'; };
const fmtP = v => { const x=Number(v); return (isNaN(x)||v===''||v===null)?'—':(x>=0?'+':'')+x.toFixed(2)+'%'; };
const fmtPr = (v,mkt) => { const x=Number(v); return (!v||isNaN(x))?'—':mkt==='미장'?'$'+x.toFixed(2):x.toLocaleString('ko-KR')+'원'; };
const nv = v => (v===null||v===undefined||v==='')?null:Number(v);

let rChart, mChart;

function parseCsv(url) {
  return new Promise((resolve, reject) => {
    Papa.parse(url+'&t='+Date.now(), {
      download: true, header: true, skipEmptyLines: true,
      complete: r => resolve(r.data),
      error: e => reject(e)
    });
  });
}

function render(rows, cashKRW, cashUSD, usdRate) {
  document.getElementById('sDot').style.background = '#1D9E75';
  document.getElementById('sTxt').textContent = `연동 완료 · 매매 ${rows.length}건 · 환율 ${Math.round(usdRate).toLocaleString()}원 · ${new Date().toLocaleTimeString('ko-KR')}`;
  document.getElementById('lastUpdate').textContent = `마지막 업데이트: ${new Date().toLocaleString('ko-KR')}`;

  // 보유중 / 매도완료 분리
  const holding = rows.filter(r => String(r['상태']||'').includes('보유'));
  const sold = rows.filter(r => String(r['상태']||'').includes('매도'));

  // 실현 손익은 매도완료 기준 — 종목별 합산 (분할매수 통합)
  const soldMap = {};
  sold.forEach(r => {
    const key = r['종목'] + '|' + r['매수일'];
    if (!soldMap[key]) soldMap[key] = { pnl: 0, buyAmt: 0 };
    soldMap[key].pnl    += (nv(r['손익(원)'])||0);
    soldMap[key].buyAmt += (nv(r['매수금액(원)'])||0);
  });
  // 같은 종목 같은날 매수분을 하나로 합산 후 종목 단위로 다시 합산
  const soldByName = {};
  sold.forEach(r => {
    const name = r['종목'];
    if (!soldByName[name]) soldByName[name] = { pnl: 0, buyAmt: 0 };
    soldByName[name].pnl    += (nv(r['손익(원)'])||0);
    soldByName[name].buyAmt += (nv(r['매수금액(원)'])||0);
  });
  const soldGroups  = Object.values(soldByName);
  const totalPnl    = soldGroups.reduce((s,r) => s+r.pnl, 0);
  const winners     = soldGroups.filter(r => r.pnl > 0);
  const losers      = soldGroups.filter(r => r.pnl < 0);
  const pct         = soldGroups.length > 0 ? totalPnl / soldGroups.reduce((s,r) => s+r.buyAmt, 0) * 100 : 0;

  // 투자금액은 보유중 기준 — 종목별 합산
  const holdingByName = {};
  holding.forEach(r => {
    const name = r['종목'];
    if (!holdingByName[name]) holdingByName[name] = { market: r['시장'], amt: 0 };
    holdingByName[name].amt += (nv(r['매수금액(원)'])||0);
  });
  const holdingGroups = Object.values(holdingByName);
  const totalInvest   = holdingGroups.reduce((s,r) => s+r.amt, 0);
  const kr = holdingGroups.filter(r => r.market==='국장').length;
  const us = holdingGroups.filter(r => r.market==='미장').length;

  const cashUSDinKRW = cashUSD * usdRate;
  const totalCash = cashKRW + cashUSDinKRW;
  const totalAssets = totalInvest + totalCash;

  document.getElementById('m-assets').textContent = fmtA(totalAssets);
  document.getElementById('m-assets-sub').textContent = '투자 + 현금 합계';
  document.getElementById('m-total').textContent = fmtA(totalInvest);
  document.getElementById('m-hold').textContent = `국장 ${kr} / 미장 ${us} 보유중`;
  document.getElementById('m-cash').textContent = fmtA(totalCash);
  document.getElementById('m-cash-sub').textContent = `원화 ${Math.round(cashKRW).toLocaleString()}원 + $${cashUSD.toLocaleString()}`;
  const pEl = document.getElementById('m-pnl');
  pEl.textContent = fmtW(totalPnl);
  pEl.className = 'metric-value '+(totalPnl>=0?'pos':'neg');
  document.getElementById('m-pct').textContent = fmtP(pct)+' 전체';
  document.getElementById('m-win').textContent = soldGroups.length>0?(winners.length/soldGroups.length*100).toFixed(1)+'%':'—';
  document.getElementById('m-winsub').textContent = `${winners.length}승 ${losers.length}패`;

  // 차트는 보유중 종목만 — 같은 종목 합산
  const holdingMap = {};
  holding.forEach(r => {
    const key = r['종목'] + '|' + (r['시장']||'');
    if (!holdingMap[key]) holdingMap[key] = { 종목: r['종목'], 시장: r['시장']||'', amount: 0 };
    holdingMap[key].amount += (nv(r['매수금액(원)'])||0);
  });
  const sorted = Object.values(holdingMap).sort((a,b)=>b.amount-a.amount);
  if (rChart) rChart.destroy();

  if (sorted.length === 0) {
    document.getElementById('retChart').parentElement.innerHTML = '<p style="text-align:center;color:#aaa;padding:4rem 0;font-size:13px;">보유 중인 종목 없음</p>';
  } else {
    rChart = new Chart(document.getElementById('retChart'), {
      type:'bar',
      data:{ labels:sorted.map(r=>r['종목']||''), datasets:[{data:sorted.map(r=>r.amount),backgroundColor:sorted.map(r=>r['시장']==='미장'?'#EF9F27':'#378ADD'),borderRadius:3,borderSkipped:false}]},
      options:{ responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${Math.round(ctx.raw).toLocaleString()}원`}}},
        scales:{
          x:{ticks:{font:{size:10},color:'#aaa',maxRotation:45,autoSkip:false},grid:{display:false},border:{color:'#eee'}},
          y:{ticks:{font:{size:10},color:'#aaa',callback:v=>(v/10000).toFixed(0)+'만'},grid:{color:'rgba(0,0,0,0.05)'},border:{color:'#eee'}}
        }
      }
    });
  }

  const krAmt = holding.filter(r=>r['시장']==='국장').reduce((s,r)=>s+(nv(r['매수금액(원)'])||0),0);
  const usAmt = holding.filter(r=>r['시장']==='미장').reduce((s,r)=>s+(nv(r['매수금액(원)'])||0),0);
  const tot = totalAssets;
  document.getElementById('mktLegend').innerHTML = [
    ['국장 주식', krAmt, '#378ADD'],
    ['미장 주식', usAmt, '#EF9F27'],
    ['원화 현금', cashKRW, '#1D9E75'],
    ['달러 현금', cashUSDinKRW, '#9B59B6'],
  ].map(([l,a,c])=>`<div class="legend-item"><div class="legend-dot" style="background:${c};"></div>${l} ${tot>0?(a/tot*100).toFixed(1):0}%</div>`).join('');

  if (mChart) mChart.destroy();
  mChart = new Chart(document.getElementById('mktChart'), {
    type:'doughnut',
    data:{labels:['국장 주식','미장 주식','원화 현금','달러 현금'],datasets:[{data:[krAmt,usAmt,cashKRW,cashUSDinKRW],backgroundColor:['#378ADD','#EF9F27','#1D9E75','#9B59B6'],borderWidth:0,hoverOffset:4}]},
    options:{ responsive:true, maintainAspectRatio:false, cutout:'65%',
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${Math.round(ctx.raw).toLocaleString()}원`}}}
    }
  });

  // 매매 내역은 전체 (최신순)
  document.getElementById('tbody').innerHTML = [...rows].reverse().map(r=>{
    const mkt=r['시장']||''; const state=String(r['상태']||'');
    const pv=nv(r['수익률(%)']); const pnlv=nv(r['손익(원)']);
    const rCls=pv===null||isNaN(pv)?'':pv>0?'pos':pv<0?'neg':'';
    const pCls=pnlv===null||isNaN(pnlv)?'':pnlv>0?'pos':pnlv<0?'neg':'';
    return `<tr>
      <td style="font-weight:500;color:#111;">${r['종목']||'—'}</td>
      <td><span class="badge ${mkt==='미장'?'badge-us':'badge-kr'}">${mkt||'—'}</span></td>
      <td style="color:#aaa;font-size:11px;">${r['매수일']||'—'}</td>
      <td>${fmtPr(r['매수가'],mkt)}</td>
      <td style="color:#aaa;">${r['수량']||'—'}</td>
      <td>${fmtA(r['매수금액(원)'])}</td>
      <td style="color:#aaa;font-size:11px;">${r['매도일']||'—'}</td>
      <td class="${pCls}">${pnlv!==null&&!isNaN(pnlv)?fmtW(pnlv):'—'}</td>
      <td class="${rCls}">${pv!==null&&!isNaN(pv)?fmtP(pv):'—'}</td>
      <td><span class="badge ${state.includes('보유')?'badge-hold':'badge-sold'}">${state||'—'}</span></td>
    </tr>`;
  }).join('');
}

async function run() {
  document.getElementById('sDot').style.background = '#BA7517';
  document.getElementById('sTxt').textContent = '구글 시트 연결 중...';
  try {
    const [tradeRows, cashRows] = await Promise.all([
      parseCsv(TRADE_CSV),
      parseCsv(CASH_CSV),
    ]);
    const cleanNum = v => Number(String(v || 0).replace(/,/g, ''));
    const cashKRW = cleanNum(cashRows.find(r=>r['구분']==='원화')?.['금액']);
    const cashUSD = cleanNum(cashRows.find(r=>r['구분']==='달러')?.['금액']);
    const usdRate = cleanNum(cashRows.find(r=>r['구분']==='환율')?.['금액']) || 1480;
    render(tradeRows, cashKRW, cashUSD, usdRate);
  } catch(e) {
    document.getElementById('sDot').style.background = '#D85A30';
    document.getElementById('sTxt').textContent = '오류: ' + e.message;
  }
}

run();
</script>
</body>
</html>
