<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>WONNY Portfolio Insight</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  /* 1. 화이트 테마 스타일 */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: 'Pretendard', sans-serif; 
    background: #f8fafc; 
    color: #1e293b; 
    padding: 2rem; 
    min-height: 100vh;
    line-height: 1.5;
  }
  h1 { font-size: 24px; font-weight: 700; color: #0f172a; margin-bottom: 6px; letter-spacing: -0.02em; }
  .subtitle { font-size: 14px; color: #64748b; margin-bottom: 2rem; }
  .status-bar { 
    display: flex; align-items: center; gap: 10px; 
    margin-bottom: 1.5rem; padding: 12px 20px; 
    background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; 
    font-size: 13px; color: #64748b; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #e2e8f0; }
  .refresh-btn { 
    margin-left: auto; background: #0066ff; border: none; color: #fff; 
    padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; 
    cursor: pointer; transition: all 0.2s ease;
  }
  .metric-grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 2rem; }
  .metric { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
  .metric.highlight { border: 2px solid #0066ff; background: #f0f7ff; }
  .metric-label { font-size: 11px; font-weight: 700; color: #64748b; margin-bottom: 8px; text-transform: uppercase; }
  .metric-value { font-size: 22px; font-weight: 700; color: #0f172a; font-family: 'Inter', sans-serif; }
  .metric-sub { font-size: 12px; color: #94a3b8; margin-top: 4px; }
  .pos { color: #16a34a !important; } .neg { color: #dc2626 !important; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 2rem; }
  .card, .card-full { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
  .card-title { font-size: 15px; font-weight: 700; color: #0f172a; margin-bottom: 20px; }
  .tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
  .tbl th { font-size: 11px; color: #64748b; text-align: left; padding: 12px; border-bottom: 2px solid #f1f5f9; }
  .tbl td { padding: 14px 12px; border-bottom: 1px solid #f1f5f9; color: #334155; font-family: 'Inter', sans-serif; }
  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 6px; }
  .badge-kr { background: #eff6ff; color: #0066ff; }
  .badge-us { background: #f1f5f9; color: #475569; }
  .badge-hold { background: #ecfdf5; color: #059669; }
  .badge-sold { background: #f8fafc; color: #94a3b8; border: 1px solid #e2e8f0; }
  .month-group { margin-bottom: 12px; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; background: #fff; }
  .month-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; cursor: pointer; }
  .month-body { display: none; padding: 0 20px 20px 20px; }
  .month-body.open { display: block; }
</style>
</head>
<body>

<h1>WONNY Portfolio Insight</h1>
<p class="subtitle" id="lastUpdate">데이터 로드 중...</p>

<div class="status-bar">
  <div class="status-dot" id="sDot"></div>
  <span id="sTxt">구글 시트 연결 중...</span>
  <button class="refresh-btn" onclick="run()">새로고침</button>
</div>

<div class="metric-grid-5">
  <div class="metric highlight"><div class="metric-label">총 자산</div><div class="metric-value" id="m-assets">—</div><div class="metric-sub">투자금 + 현금</div></div>
  <div class="metric"><div class="metric-label">총 투자금액</div><div class="metric-value" id="m-total">—</div><div class="metric-sub" id="m-hold">보유 종목 총액</div></div>
  <div class="metric"><div class="metric-label">보유 현금</div><div class="metric-value" id="m-cash">—</div><div class="metric-sub" id="m-cash-sub">—</div></div>
  <div class="metric"><div class="metric-label">실현 손익</div><div class="metric-value" id="m-pnl">—</div><div class="metric-sub" id="m-pct">—</div></div>
  <div class="metric"><div class="metric-label">승률</div><div class="metric-value" id="m-win">—</div><div class="metric-sub" id="m-winsub">—</div></div>
</div>
