<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>WONNY Portfolio Insight</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', sans-serif; background: #0b1520; color: #d8d0bc; padding: 2rem; min-height: 100vh; }
  h1 { font-size: 20px; font-weight: 600; color: #e8d5a3; margin-bottom: 4px; font-family: 'Inter', sans-serif; }
  .subtitle { font-size: 12px; color: #5a6e82; margin-bottom: 1.5rem; }
  .status-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 1.5rem; padding: 10px 14px; background: #0e1828; border: 0.5px solid #1a2d40; border-radius: 8px; font-size: 12px; color: #6a8099; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; }
  .refresh-btn { margin-left: auto; background: transparent; border: 0.5px solid #2e4060; color: #6a8099; padding: 4px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; }
  .metric-grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .metric { background: #111d2c; border: 0.5px solid #1a2d40; border-radius: 10px; padding: 14px 16px; }
  .metric-label { font-size: 11px; color: #6a8099; margin-bottom: 6px; text-transform: uppercase; }
  .metric-value { font-size: 19px; font-weight: 500; color: #c8b484; font-family: 'Inter', sans-serif; }
  .pos { color: #4a9e6e !important; } .neg { color: #9e4a4a !important; }
  .card-full { background: #111d2c; border: 0.5px solid #1a2d40; border-radius: 12px; padding: 16px; }
  .tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
  .tbl th { font-size: 10px; color: #5a7890; text-align: left; padding: 6px 10px; border-bottom: 0.5px solid #141e2c; text-transform: uppercase; }
  .tbl td { padding: 9px 10px; border-bottom: 0.5px solid #0f1820; color: #9aabbd; font-family: 'Inter', sans-serif; }
  .badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; }
  .badge-kr { background: #1a0e16; color: #a83258; }
  .badge-us { background: #0e1220; color: #4a6eb8; }
  .month-group { margin-bottom: 6px; border: 0.5px solid #1a2d40; border-radius: 10px; overflow: hidden; }
  .month-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; cursor: pointer; background: #0f1c2c; }
  .month-body { display: none; }
  .month-body.open { display: block; }
  @media (max-width: 768px) { .metric-grid-5 { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<h1>WONNY Portfolio Insight</h1>
<p class="subtitle" id="lastUpdate">데이터 불러오는 중...</p>

<div class="status-bar">
  <div class="status-dot" style="background:#8a6e32;" id="sDot"></div>
  <span id="sTxt">구글 시트 연결 중...</span>
  <button class="refresh-btn" onclick="run()">새로고침</button>
</div>

<div class="metric-grid-5">
  <div class="metric"><div class="metric-label">총 자산</div><div class="metric-value" id="m-assets">—</div></div>
  <div class="metric"><div class="metric-label">총 투자금액</div><div class="metric-value" id="m-total">—</div></div>
  <div class="metric"><div class="metric-label">보유 현금</div><div class="metric-value" id="m-cash">—</div></div>
  <div class="metric"><div class="metric-label">실현 손익</div><div class="metric-value" id="m-pnl">—</div></div>
  <div class="metric"><div class="metric-label">승률</div><div class="metric-value" id="m-win">—</div></div>
</div>

<div class="card-full">
  <div class="card-title" style="margin-bottom:16px; font-size: 11px; color: #6a8099;">매매 내역</div>
  <div id="accordion"></div>
</div>

<script>
const TRADE_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRgDk4qNXL-ByfHEPG7pwnK8Zz96-IPU5GlC0D_kFipnAkKiBtSIvyQsnZWZ0uofAA51iqxOCsZ2-_W/pub?gid=512959016&single=true&output=csv';
const CASH_CSV  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRgDk4qNXL-ByfHEPG7pwnK8Zz96-IPU5GlC0D_kFipnAkKiBtSIvyQsnZWZ0uofAA51iqxOCsZ2-_W/pub?gid=2018962040&single=true&output=csv';

const fmtA  = v => { const x=Number(v); return (isNaN(x)||v===''||v===null)?'—':Math.round(x).toLocaleString('ko-KR')+'원'; };
const fmtW  = v => { const x=Number(v); return (isNaN(x)||v===''||v===null)?'—':(x>=0?'+':'')+Math.round(x).toLocaleString('ko-KR')+'원'; };
const fmtP  = v => { const x=Number(v); return (isNaN(x)||v===''||v===null)?'—':(x>=0?'+':'')+x.toFixed(2)+'%'; };

// 평단가 포맷: 국장만 소수점 제거 적용
const fmtPr = (v, mkt) => { 
  const x = Number(v); 
  if (!v || isNaN(x)) return '—';
  if (mkt === '미장') {
    return '$' + x.toFixed(2);
  } else {
    return Math.round(x).toLocaleString('ko-KR') + '원';
  }
};

const nv = v => (v===null||v===undefined||v==='')?null:Number(String(v).replace(/,/g,''));

function parseCsv(url) {
  return new Promise((resolve, reject) => {
    Papa.parse(url+'&t='+Date.now(), {
      download: true, header: true, skipEmptyLines: true,
      complete: r => resolve(r.data),
      error: e => reject(e)
    });
  });
}

function toggleMonth(id) {
  document.getElementById('body-'+id).classList.toggle('open');
}

function buildAccordion(rows) {
  const tableMap = {};
  [...rows].reverse().forEach(r => {
    const mon = (r['매수일']||'').slice(0,7);
    const key = r['종목']+'|'+(r['시장']||'')+'|'+(r['상태']||'')+'|'+mon;
    if (!tableMap[key]) {
      tableMap[key] = {
        종목: r['종목'], 시장: r['시장']||'', 상태: String(r['상태']||''),
        매수일: r['매수일']||'', 매도일: r['매도일']||'', 월: mon,
        totalBuyAmt: 0, totalPnl: 0, totalQty: 0, weightedPrice: 0,
      };
    }
    const g = tableMap[key];
    const qty = nv(r['수량'])||0;
    g.totalQty += qty;
    g.totalBuyAmt += nv(r['매수금액(원)'])||0;
    g.totalPnl += nv(r['손익(원)'])||0;
    g.weightedPrice += (nv(r['매수가'])||0) * qty;
  });

  const monthMap = {};
  Object.values(tableMap).forEach(g => {
    const m = g.월||'기타';
    if (!monthMap[m]) monthMap[m] = [];
    monthMap[m].push(g);
  });

  const months = Object.keys(monthMap).sort().reverse();
  const html = months.map((m, idx) => {
    const items = monthMap[m];
    const isFirst = idx === 0;

    const trows = items.map(g => {
      const avg = g.totalQty > 0 ? g.weightedPrice / g.totalQty : 0;
      const isHold = g.상태.includes('보유');
      return `<tr>
        <td style="color:#c4b484; font-weight:500;">${g.종목||'—'}</td>
        <td><span class="badge ${g.시장==='미장'?'badge-us':'badge-kr'}">${g.시장==='미장'?'🇺🇸':'🇰🇷'}</span></td>
        <td>${g.매수일||'—'}</td>
        <td>${fmtPr(avg, g.시장)}</td>
        <td>${g.totalQty||'—'}</td>
        <td>${fmtA(g.totalBuyAmt)}</td>
        <td style="color:#5a7890;">${isHold?'—':(g.매도일||'—')}</td>
        <td class="${g.totalPnl>=0?'pos':'neg'}">${isHold?'—':fmtW(g.totalPnl)}</td>
        <td><span class="badge ${isHold?'':'badge-sold'}" style="background:${isHold?'#0e2018':'#141820'}; color:${isHold?'#4a9e6e':'#5a6a7e'};">${g.상태||'—'}</span></td>
      </tr>`;
    }).join('');

    return `<div class="month-group">
      <div class="month-header" onclick="toggleMonth('${m}')">
        <span style="color:#c4b484; font-weight:500;">${m}</span>
        <span style="font-size:10px; color:#5a7890;">▼</span>
      </div>
      <div class="month-body ${isFirst?'open':''}" id="body-${m}">
        <div style="overflow-x:auto;">
          <table class="tbl">
            <thead><tr><th>종목</th><th>시장</th><th>매수일</th><th>매수가</th><th>수량</th><th>매수금액</th><th>매도일</th><th>손익</th><th>상태</th></tr></thead>
            <tbody>${trows}</tbody>
          </table>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('accordion').innerHTML = html;
}

async function run() {
  try {
    const [tradeRows, cashRows] = await Promise.all([parseCsv(TRADE_CSV), parseCsv(CASH_CSV)]);
    const cleanNum = v => Number(String(v||0).replace(/,/g,''));
    const cashKRW = cleanNum(cashRows.find(r=>r['구분']==='원화')?.['금액']);
    const cashUSD = cleanNum(cashRows.find(r=>r['구분']==='달러')?.['금액']);
    const usdRate = cleanNum(cashRows.find(r=>r['구분']==='환율')?.['금액'])||1480;

    document.getElementById('sDot').style.background = '#4a9e6e';
    document.getElementById('sTxt').textContent = '연동 완료';
    document.getElementById('lastUpdate').textContent = `최근 업데이트: ${new Date().toLocaleString()}`;
    
    // 간략 요약 데이터 계산 및 렌더링 생략 (기존 render 함수 로직 유지 필요시 추가)
    buildAccordion(tradeRows);
  } catch(e) {
    document.getElementById('sTxt').textContent = '오류 발생';
  }
}

run();
</script>
</body>
</html>
