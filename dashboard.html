<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<title>WONNY Portfolio Insight</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0b1520; color: #d8d0bc; padding: 2rem; min-height: 100vh; }
  h1 { font-size: 20px; font-weight: 600; color: #e8d5a3; margin-bottom: 4px; letter-spacing: 0.01em; font-family: 'Inter', 'Pretendard', sans-serif; }
  .subtitle { font-size: 12px; color: #5a6e82; margin-bottom: 1.5rem; }
  .metric-grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .metric { background: #111d2c; border: 0.5px solid #1a2d40; border-radius: 10px; padding: 14px 16px; }
  .metric.highlight { border-color: #8a6e32; }
  .metric-label { font-size: 11px; color: #6a8099; margin-bottom: 6px; letter-spacing: 0.05em; text-transform: uppercase; }
  .metric-value { font-size: 19px; font-weight: 500; color: #c8b484; font-family: 'Inter', sans-serif; letter-spacing: -0.02em; }
  .metric-sub { font-size: 11px; color: #4a5e72; margin-top: 4px; }
  .pos { color: #4a9e6e !important; } .neg { color: #9e4a4a !important; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
  .card { background: #111d2c; border: 0.5px solid #1a2d40; border-radius: 12px; padding: 16px; }
  .card-full { background: #111d2c; border: 0.5px solid #1a2d40; border-radius: 12px; padding: 16px; }
  .card-title { font-size: 11px; font-weight: 500; color: #6a8099; margin-bottom: 14px; letter-spacing: 0.07em; text-transform: uppercase; }
  .legend-row { display: flex; gap: 14px; margin-bottom: 10px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #6a8099; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
  .tbl th { font-size: 10px; font-weight: 500; color: #5a7890; text-align: left; padding: 6px 10px; border-bottom: 0.5px solid #141e2c; white-space: nowrap; letter-spacing: 0.05em; text-transform: uppercase; }
  .tbl td { padding: 9px 10px; border-bottom: 0.5px solid #0f1820; color: #9aabbd; white-space: nowrap; font-family: 'Inter', sans-serif; font-size: 12px; }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl tbody tr:hover { background: #0e1828; }
  .tbl .name { color: #c4b484; font-weight: 500; font-family: 'Pretendard', sans-serif; }
  .badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 20px; }
  .badge-kr { background: #1a0e16; color: #a83258; }
  .badge-us { background: #0e1220; color: #4a6eb8; }
  .badge-hold { background: #0e2018; color: #4a9e6e; }
  .badge-sold { background: #141820; color: #5a6a7e; }
  .status-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 1.5rem; padding: 10px 14px; background: #0e1828; border: 0.5px solid #1a2d40; border-radius: 8px; font-size: 12px; color: #6a8099; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .refresh-btn { margin-left: auto; background: transparent; border: 0.5px solid #2e4060; color: #6a8099; padding: 4px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; }
  .refresh-btn:hover { background: #0e1828; color: #c8b484; }
  .month-group { margin-bottom: 6px; border: 0.5px solid #1a2d40; border-radius: 10px; overflow: hidden; }
  .month-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; cursor: pointer; background: #0f1c2c; transition: background 0.15s; user-select: none; }
  .month-header:hover { background: #121f30; }
  .month-header.open { background: #131f2e; border-bottom: 0.5px solid #1a2d40; }
  .month-label { font-size: 13px; font-weight: 500; color: #c4b484; display: flex; align-items: center; gap: 10px; font-family: 'Pretendard', sans-serif; }
  .month-stats { display: flex; align-items: center; gap: 16px; }
  .month-pnl { font-size: 12px; font-weight: 500; }
  .month-arrow { font-size: 10px; color: #5a7890; transition: transform 0.2s; display: inline-block; }
  .month-arrow.open { transform: rotate(180deg); }
  .month-body { display: none; }
  .month-body.open { display: block; }
  @media (max-width: 768px) {
    body { padding: 1rem; }
    .metric-grid-5 { grid-template-columns: repeat(2, 1fr); }
    .charts-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<h1>WONNY Portfolio Insight</h1>
<p class="subtitle" id="lastUpdate">데이터 불러오는 중...</p>

<div class="status-bar">
  <div class="status-dot" style="background:#8a6e32;" id="sDot"></div>
  <span id="sTxt">구글 시트 연결 중...</span>
  <button class="refresh-btn" onclick="run()">새로고침</button>
</div>

<div class="metric-grid-5">
  <div class="metric highlight"><div class="metric-label">총 자산</div><div class="metric-value" id="m-assets">—</div><div class="metric-sub" id="m-assets-sub"></div></div>
  <div class="metric"><div class="metric-label">총 투자금액</div><div class="metric-value" id="m-total">—</div><div class="metric-sub" id="m-hold"></div></div>
  <div class="metric"><div class="metric-label">보유 현금</div><div class="metric-value" id="m-cash">—</div><div class="metric-sub" id="m-cash-sub"></div></div>
  <div class="metric"><div class="metric-label">실현 손익</div><div class="metric-value" id="m-pnl">—</div><div class="metric-sub" id="m-pct"></div></div>
  <div class="metric"><div class="metric-label">승률</div><div class="metric-value" id="m-win">—</div><div class="metric-sub" id="m-winsub"></div></div>
</div>

<div class="charts-row">
  <div class="card">
    <div class="card-title">보유 종목별 투자금액</div>
    <div class="legend-row">
      <div class="legend-item"><div class="legend-dot" style="background:#a83258;"></div>국장</div>
      <div class="legend-item"><div class="legend-dot" style="background:#4a6eb8;"></div>미장</div>
    </div>
    <div style="position:relative;height:220px;"><canvas id="retChart"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title">자산 구성</div>
    <div id="mktLegend" class="legend-row"></div>
    <div style="position:relative;height:220px;"><canvas id="mktChart"></canvas></div>
  </div>
</div>

<div class="card-full">
  <div class="card-title" style="margin-bottom:16px;">매매 내역</div>
  <div id="accordion"></div>
</div>

<script>
const TRADE_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRgDk4qNXL-ByfHEPG7pwnK8Zz96-IPU5GlC0D_kFipnAkKiBtSIvyQsnZWZ0uofAA51iqxOCsZ2-_W/pub?gid=512959016&single=true&output=csv';
const CASH_CSV  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRgDk4qNXL-ByfHEPG7pwnK8Zz96-IPU5GlC0D_kFipnAkKiBtSIvyQsnZWZ0uofAA51iqxOCsZ2-_W/pub?gid=2018962040&single=true&output=csv';

const fmtA  = v => { const x=Number(v); return (isNaN(x)||v===''||v===null)?'—':Math.round(x).toLocaleString('ko-KR')+'원'; };
const fmtW  = v => { const x=Number(v); return (isNaN(x)||v===''||v===null)?'—':(x>=0?'+':'')+Math.round(x).toLocaleString('ko-KR')+'원'; };
const fmtP  = v => { const x=Number(v); return (isNaN(x)||v===''||v===null)?'—':(x>=0?'+':'')+x.toFixed(2)+'%'; };
const fmtPr = (v,mkt) => { const x=Number(v); return (!v||isNaN(x))?'—':mkt==='미장'?'$'+x.toFixed(2):x.toLocaleString('ko-KR')+'원'; };
const nv    = v => (v===null||v===undefined||v==='')?null:Number(String(v).replace(/,/g,''));

let rChart, mChart;

function parseCsv(url) {
  return new Promise((resolve, reject) => {
    Papa.parse(url+'&t='+Date.now(), {
      download: true, header: true, skipEmptyLines: true,
      complete: r => resolve(r.data),
      error: e => reject(e)
    });
  });
}

function toggleMonth(id) {
  const body  = document.getElementById('body-'+id);
  const arrow = document.getElementById('arrow-'+id);
  const hdr   = document.getElementById('hdr-'+id);
  body.classList.toggle('open');
  arrow.classList.toggle('open');
  hdr.classList.toggle('open');
}

function buildAccordion(rows) {
  const tableMap = {};
  [...rows].reverse().forEach(r => {
    const mon = (r['매수일']||'').slice(0,7);
    const key = r['종목']+'|'+(r['시장']||'')+'|'+(r['상태']||'')+'|'+mon;
    if (!tableMap[key]) {
      tableMap[key] = {
        종목: r['종목'], 시장: r['시장']||'', 상태: String(r['상태']||''),
        매수일: r['매수일']||'', 매도일: r['매도일']||'', 월: mon,
        totalBuyAmt: 0, totalPnl: 0, totalQty: 0, weightedPrice: 0,
      };
    }
    const g = tableMap[key];
    const qty = nv(r['수량'])||0;
    g.totalQty += qty;
    g.totalBuyAmt += nv(r['매수금액(원)'])||0;
    g.totalPnl += nv(r['손익(원)'])||0;
    g.weightedPrice += (nv(r['매수가'])||0) * qty;
    if (!g.매도일 && r['매도일']) g.매도일 = r['매도일'];
  });

  const monthMap = {};
  Object.values(tableMap).forEach(g => {
    const m = g.월||'기타';
    if (!monthMap[m]) monthMap[m] = [];
    monthMap[m].push(g);
  });

  const months = Object.keys(monthMap).sort().reverse();
  const MO = ['','1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  const html = months.map((m, idx) => {
    const items = monthMap[m];
    const sold  = items.filter(g => !g.상태.includes('보유'));
    const monthPnl = sold.reduce((s,g) => s+g.totalPnl, 0);
    const wins  = sold.filter(g => g.totalPnl > 0).length;
    const [y, mo] = m.split('-');
    const label = mo ? `${y}년 ${MO[parseInt(mo)]}` : m;
    const pnlCls = monthPnl >= 0 ? 'pos' : 'neg';
    const isFirst = idx === 0;

    const trows = items.map(g => {
      const mkt = g.시장; const state = g.상태;
      const avg = g.totalQty > 0 ? g.weightedPrice / g.totalQty : 0;
      const ret = g.totalBuyAmt > 0 && !state.includes('보유') ? g.totalPnl/g.totalBuyAmt*100 : null;
      const pCls = g.totalPnl >= 0 ? 'pos' : 'neg';
      const rCls = ret !== null && ret >= 0 ? 'pos' : 'neg';
      const isHold = state.includes('보유');
      return `<tr>
        <td class="name">${g.종목||'—'}</td>
        <td><span class="badge ${mkt==='미장'?'badge-us':'badge-kr'}">${mkt==='미장'?'🇺🇸':mkt==='국장'?'🇰🇷':'-'}</span></td>
        <td>${g.매수일||'—'}</td>
        <td>${fmtPr(avg,mkt)}</td>
        <td>${g.totalQty||'—'}</td>
        <td>${fmtA(g.totalBuyAmt)}</td>
        <td style="color:#5a7890;">${isHold?'—':(g.매도일||'—')}</td>
        <td class="${pCls}">${isHold?'—':fmtW(g.totalPnl)}</td>
        <td class="${rCls}">${ret===null?'—':fmtP(ret)}</td>
        <td><span class="badge ${isHold?'badge-hold':'badge-sold'}">${state||'—'}</span></td>
      </tr>`;
    }).join('');

    return `<div class="month-group">
      <div class="month-header${isFirst?' open':''}" id="hdr-${m}" onclick="toggleMonth('${m}')">
        <div class="month-label">
          <span>${label}</span>
          <span style="font-size:11px;color:#5a7890;font-weight:400;">${items.length}건</span>
        </div>
        <div class="month-stats">
          ${sold.length>0?`<span style="font-size:11px;color:#5a7890;">${wins}승 ${sold.length-wins}패</span>`:''}
          ${sold.length>0?`<span class="month-pnl ${pnlCls}">${fmtW(monthPnl)}</span>`:'<span style="font-size:11px;color:#5a7890;">보유중</span>'}
          <span class="month-arrow${isFirst?' open':''}" id="arrow-${m}">▼</span>
        </div>
      </div>
      <div class="month-body${isFirst?' open':''}" id="body-${m}">
        <div style="overflow-x:auto;">
          <table class="tbl">
            <thead><tr>
              <th>종목</th><th>시장</th><th>매수일</th><th>매수가</th><th>수량</th>
              <th>매수금액</th><th>매도일</th><th>손익</th><th>수익률</th><th>상태</th>
            </tr></thead>
            <tbody>${trows}</tbody>
          </table>
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('accordion').innerHTML = html;
}

function render(rows, cashKRW, cashUSD, usdRate) {
  document.getElementById('sDot').style.background = '#4a9e6e';
  document.getElementById('sTxt').textContent = `연동 완료 · 매매 ${rows.length}건 · 환율 ${Math.round(usdRate).toLocaleString()}원 · ${new Date().toLocaleTimeString('ko-KR')}`;
  document.getElementById('lastUpdate').textContent = `마지막 업데이트: ${new Date().toLocaleString('ko-KR')}`;

  const holding = rows.filter(r => String(r['상태']||'').includes('보유'));
  const sold    = rows.filter(r => String(r['상태']||'').includes('매도'));

  const soldByName = {};
  sold.forEach(r => {
    const n = r['종목'];
    if (!soldByName[n]) soldByName[n] = { pnl:0, buyAmt:0 };
    soldByName[n].pnl    += nv(r['손익(원)'])||0;
    soldByName[n].buyAmt += nv(r['매수금액(원)'])||0;
  });
  const sg = Object.values(soldByName);
  const totalPnl = sg.reduce((s,r)=>s+r.pnl,0);
  const winners  = sg.filter(r=>r.pnl>0);
  const losers   = sg.filter(r=>r.pnl<0);
  const pct      = sg.length>0 ? totalPnl/sg.reduce((s,r)=>s+r.buyAmt,0)*100 : 0;

  const hbn = {};
  holding.forEach(r => {
    const n=r['종목'];
    if (!hbn[n]) hbn[n]={market:r['시장'],amt:0};
    hbn[n].amt += nv(r['매수금액(원)'])||0;
  });
  const hg = Object.values(hbn);
  const totalInvest = hg.reduce((s,r)=>s+r.amt,0);
  const kr = hg.filter(r=>r.market==='국장').length;
  const us = hg.filter(r=>r.market==='미장').length;

  const cashUSDinKRW = cashUSD * usdRate;
  const totalCash   = cashKRW + cashUSDinKRW;
  const totalAssets = totalInvest + totalCash;

  document.getElementById('m-assets').textContent = fmtA(totalAssets);
  document.getElementById('m-assets-sub').textContent = '투자 + 현금 합계';
  document.getElementById('m-total').textContent = fmtA(totalInvest);
  document.getElementById('m-hold').textContent = `국장 ${kr} / 미장 ${us} 보유중`;
  document.getElementById('m-cash').textContent = fmtA(totalCash);
  document.getElementById('m-cash-sub').textContent = `원화 ${Math.round(cashKRW).toLocaleString()}원 + $${cashUSD.toLocaleString()}`;
  const pEl = document.getElementById('m-pnl');
  pEl.textContent = fmtW(totalPnl);
  pEl.className = 'metric-value '+(totalPnl>=0?'pos':'neg');
  document.getElementById('m-pct').textContent = fmtP(pct)+' 전체';
  document.getElementById('m-win').textContent = sg.length>0?(winners.length/sg.length*100).toFixed(1)+'%':'—';
  document.getElementById('m-winsub').textContent = `${winners.length}승 ${losers.length}패`;

  const hm = {};
  holding.forEach(r => {
    const key=r['종목']+'|'+(r['시장']||'');
    if (!hm[key]) hm[key]={종목:r['종목'],시장:r['시장']||'',amount:0};
    hm[key].amount += nv(r['매수금액(원)'])||0;
  });
  const sorted = Object.values(hm).sort((a,b)=>b.amount-a.amount);
  if (rChart) rChart.destroy();
  if (sorted.length===0) {
    document.getElementById('retChart').parentElement.innerHTML='<p style="text-align:center;color:#2a3e52;padding:4rem 0;font-size:13px;">보유 중인 종목 없음</p>';
  } else {
    rChart = new Chart(document.getElementById('retChart'),{
      type:'bar',
      data:{labels:sorted.map(r=>r['종목']||''),datasets:[{data:sorted.map(r=>r.amount),backgroundColor:sorted.map(r=>r['시장']==='미장'?'#4a6eb8':'#a83258'),borderRadius:4,borderSkipped:false}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${Math.round(ctx.raw).toLocaleString()}원`}}},
        scales:{
          x:{ticks:{font:{size:10},color:'#2a3e52',maxRotation:30,autoSkip:false},grid:{display:false},border:{color:'#1a2d40'}},
          y:{ticks:{font:{size:10},color:'#2a3e52',callback:v=>(v/10000).toFixed(0)+'만'},grid:{color:'rgba(255,255,255,0.03)'},border:{color:'#1a2d40'}}
        }
      }
    });
  }

  const krAmt=holding.filter(r=>r['시장']==='국장').reduce((s,r)=>s+(nv(r['매수금액(원)'])||0),0);
  const usAmt=holding.filter(r=>r['시장']==='미장').reduce((s,r)=>s+(nv(r['매수금액(원)'])||0),0);
  document.getElementById('mktLegend').innerHTML=[
    ['국장 주식',krAmt,'#a83258'],['미장 주식',usAmt,'#4a6eb8'],
    ['원화 현금',cashKRW,'#5aa8aa'],['달러 현금',cashUSDinKRW,'#c4622e'],
  ].map(([l,a,c])=>`<div class="legend-item"><div class="legend-dot" style="background:${c};"></div>${l} ${totalAssets>0?(a/totalAssets*100).toFixed(1):0}%</div>`).join('');
  if (mChart) mChart.destroy();
  mChart = new Chart(document.getElementById('mktChart'),{
    type:'doughnut',
    data:{labels:['국장 주식','미장 주식','원화 현금','달러 현금'],datasets:[{data:[krAmt,usAmt,cashKRW,cashUSDinKRW],backgroundColor:['#a83258','#4a6eb8','#5aa8aa','#c4622e'],borderWidth:0,hoverOffset:4}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'65%',
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${Math.round(ctx.raw).toLocaleString()}원`}}}
    }
  });

  buildAccordion(rows);
}

async function run() {
  document.getElementById('sDot').style.background = '#8a6e32';
  document.getElementById('sTxt').textContent = '구글 시트 연결 중...';
  try {
    const [tradeRows, cashRows] = await Promise.all([parseCsv(TRADE_CSV), parseCsv(CASH_CSV)]);
    const cleanNum = v => Number(String(v||0).replace(/,/g,''));
    const cashKRW = cleanNum(cashRows.find(r=>r['구분']==='원화')?.['금액']);
    const cashUSD = cleanNum(cashRows.find(r=>r['구분']==='달러')?.['금액']);
    const usdRate = cleanNum(cashRows.find(r=>r['구분']==='환율')?.['금액'])||1480;
    render(tradeRows, cashKRW, cashUSD, usdRate);
  } catch(e) {
    document.getElementById('sDot').style.background = '#9e4a4a';
    document.getElementById('sTxt').textContent = '오류: '+e.message;
  }
}

run();
</script>
</body>
</html>
