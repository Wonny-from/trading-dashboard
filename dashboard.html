<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>WONNY Portfolio Insight</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  /* 1. 화이트 테마 스타일 */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: 'Pretendard', sans-serif; 
    background: #f8fafc; 
    color: #1e293b; 
    padding: 2rem; 
    min-height: 100vh;
    line-height: 1.5;
  }
  h1 { font-size: 24px; font-weight: 700; color: #0f172a; margin-bottom: 6px; letter-spacing: -0.02em; }
  .subtitle { font-size: 14px; color: #64748b; margin-bottom: 2rem; }
  .status-bar { 
    display: flex; align-items: center; gap: 10px; 
    margin-bottom: 1.5rem; padding: 12px 20px; 
    background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; 
    font-size: 13px; color: #64748b; box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #e2e8f0; }
  .refresh-btn { 
    margin-left: auto; background: #0066ff; border: none; color: #fff; 
    padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; 
    cursor: pointer; transition: all 0.2s ease;
  }
  .metric-grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 2rem; }
  .metric { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
  .metric.highlight { border: 2px solid #0066ff; background: #f0f7ff; }
  .metric-label { font-size: 11px; font-weight: 700; color: #64748b; margin-bottom: 8px; text-transform: uppercase; }
  .metric-value { font-size: 22px; font-weight: 700; color: #0f172a; font-family: 'Inter', sans-serif; }
  .metric-sub { font-size: 12px; color: #94a3b8; margin-top: 4px; }
  .pos { color: #16a34a !important; } .neg { color: #dc2626 !important; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 2rem; }
  .card, .card-full { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
  .card-title { font-size: 15px; font-weight: 700; color: #0f172a; margin-bottom: 20px; }
  .tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
  .tbl th { font-size: 11px; color: #64748b; text-align: left; padding: 12px; border-bottom: 2px solid #f1f5f9; }
  .tbl td { padding: 14px 12px; border-bottom: 1px solid #f1f5f9; color: #334155; font-family: 'Inter', sans-serif; }
  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 6px; }
  .badge-kr { background: #eff6ff; color: #0066ff; }
  .badge-us { background: #f1f5f9; color: #475569; }
  .badge-hold { background: #ecfdf5; color: #059669; }
  .badge-sold { background: #f8fafc; color: #94a3b8; border: 1px solid #e2e8f0; }
  .month-group { margin-bottom: 12px; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; background: #fff; }
  .month-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; cursor: pointer; }
  .month-body { display: none; padding: 0 20px 20px 20px; }
  .month-body.open { display: block; }
</style>
</head>
<body>

<h1>WONNY Portfolio Insight</h1>
<p class="subtitle" id="lastUpdate">데이터 로드 중...</p>

<div class="status-bar">
  <div class="status-dot" id="sDot"></div>
  <span id="sTxt">구글 시트 연결 중...</span>
  <button class="refresh-btn" onclick="run()">새로고침</button>
</div>

<div class="metric-grid-5">
  <div class="metric highlight"><div class="metric-label">총 자산</div><div class="metric-value" id="m-assets">—</div><div class="metric-sub">투자금 + 현금</div></div>
  <div class="metric"><div class="metric-label">총 투자금액</div><div class="metric-value" id="m-total">—</div><div class="metric-sub" id="m-hold">보유 종목 총액</div></div>
  <div class="metric"><div class="metric-label">보유 현금</div><div class="metric-value" id="m-cash">—</div><div class="metric-sub" id="m-cash-sub">—</div></div>
  <div class="metric"><div class="metric-label">실현 손익</div><div class="metric-value" id="m-pnl">—</div><div class="metric-sub" id="m-pct">—</div></div>
  <div class="metric"><div class="metric-label">승률</div><div class="metric-value" id="m-win">—</div><div class="metric-sub" id="m-winsub">—</div></div>
</div>

<div class="charts-row">
  <div class="card"><div class="card-title">보유 종목 비중</div><div style="height:250px;"><canvas id="retChart"></canvas></div></div>
  <div class="card"><div class="card-title">자산 구성 분포</div><div id="mktLegend" style="margin-bottom:10px; display:flex; gap:10px; font-size:12px;"></div><div style="height:250px;"><canvas id="mktChart"></canvas></div></div>
</div>

<div class="card-full">
  <div class="card-title">상세 매매 내역</div>
  <div id="accordion"></div>
</div>

<script>
const TRADE_CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRgDk4qNXL-ByfHEPG7pwnK8Zz96-IPU5GlC0D_kFipnAkKiBtSIvyQsnZWZ0uofAA51iqxOCsZ2-_W/pub?gid=512959016&single=true&output=csv';
const CASH_CSV  = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRgDk4qNXL-ByfHEPG7pwnK8Zz96-IPU5GlC0D_kFipnAkKiBtSIvyQsnZWZ0uofAA51iqxOCsZ2-_W/pub?gid=2018962040&single=true&output=csv';

const fmtA = v => isNaN(v) ? '—' : Math.round(v).toLocaleString() + '원';
const fmtW = v => (v >= 0 ? '+' : '') + Math.round(v).toLocaleString() + '원';
const fmtP = v => (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
// 2. 평단가: 국장만 소수점 제거 로직 적용
const fmtPr = (v, mkt) => {
  if (isNaN(v) || v === 0) return '—';
  return mkt === '미장' ? '$' + v.toFixed(2) : Math.round(v).toLocaleString() + '원';
};
const nv = v => v ? Number(String(v).replace(/,/g, '')) : 0;

let rChart, mChart;

function parseCsv(url) {
  return new Promise((resolve, reject) => {
    Papa.parse(url + '&t=' + Date.now(), { download: true, header: true, complete: r => resolve(r.data), error: e => reject(e) });
  });
}

function render(rows, cashKRW, cashUSD, usdRate) {
  const holding = rows.filter(r => String(r['상태']).includes('보유'));
  const sold = rows.filter(r => String(r['상태']).includes('매도'));

  // 메트릭 계산
  const totalInvest = holding.reduce((s, r) => s + nv(r['매수금액(원)']), 0);
  const totalPnl = sold.reduce((s, r) => s + nv(r['손익(원)']), 0);
  const totalBuyAmt = sold.reduce((s, r) => s + nv(r['매수금액(원)']), 0);
  const cashUSDinKRW = cashUSD * usdRate;
  const totalCash = cashKRW + cashUSDinKRW;
  const totalAssets = totalInvest + totalCash;
  const winCount = sold.filter(r => nv(r['손익(원)']) > 0).length;

  // 화면 업데이트
  document.getElementById('m-assets').textContent = fmtA(totalAssets);
  document.getElementById('m-total').textContent = fmtA(totalInvest);
  document.getElementById('m-cash').textContent = fmtA(totalCash);
  document.getElementById('m-cash-sub').textContent = `₩${Math.round(cashKRW).toLocaleString()} / $${cashUSD}`;
  document.getElementById('m-pnl').textContent = fmtW(totalPnl);
  document.getElementById('m-pnl').className = 'metric-value ' + (totalPnl >= 0 ? 'pos' : 'neg');
  document.getElementById('m-pct').textContent = totalBuyAmt ? fmtP(totalPnl / totalBuyAmt * 100) : '0%';
  document.getElementById('m-win').textContent = sold.length ? (winCount / sold.length * 100).toFixed(1) + '%' : '—';
  document.getElementById('m-winsub').textContent = `${winCount}승 ${sold.length - winCount}패`;

  // 종목별 차트
  const hMap = {};
  holding.forEach(r => { hMap[r['종목']] = (hMap[r['종목']] || 0) + nv(r['매수금액(원)']); });
  const sorted = Object.entries(hMap).sort((a, b) => b[1] - a[1]);

  if (rChart) rChart.destroy();
  rChart = new Chart(document.getElementById('retChart'), {
    type: 'bar',
    data: { labels: sorted.map(x => x[0]), datasets: [{ data: sorted.map(x => x[1]), backgroundColor: '#0066ff', borderRadius: 5 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
  });

  // 자산 구성 차트
  if (mChart) mChart.destroy();
  mChart = new Chart(document.getElementById('mktChart'), {
    type: 'doughnut',
    data: { labels: ['국장','미장','원화현금','달러현금'], datasets: [{ data: [holding.filter(r=>r['시장']==='국장').reduce((s,r)=>s+nv(r['매수금액(원)']),0), holding.filter(r=>r['시장']==='미장').reduce((s,r)=>s+nv(r['매수금액(원)']),0), cashKRW, cashUSDinKRW], backgroundColor: ['#0066ff','#94a3b8','#16a34a','#f59e0b'] }] },
    options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { display: false } } }
  });

  // 상세 내역 아코디언 빌드
  const months = [...new Set(rows.map(r => String(r['매수일']).slice(0, 7)))].sort().reverse();
  document.getElementById('accordion').innerHTML = months.map(m => {
    const mRows = rows.filter(r => String(r['매수일']).startsWith(m));
    const tBody = mRows.map(r => `
      <tr>
        <td class="name">${r['종목']}</td>
        <td><span class="badge ${r['시장']==='미장'?'badge-us':'badge-kr'}">${r['시장']}</span></td>
        <td>${r['매수일']}</td>
        <td>${fmtPr(nv(r['매수가']), r['시장'])}</td>
        <td>${r['수량']}</td>
        <td>${fmtA(nv(r['매수금액(원)']))}</td>
        <td class="${nv(r['손익(원)'])>=0?'pos':'neg'}">${r['상태'].includes('보유')?'—':fmtW(nv(r['손익(원)']))}</td>
        <td><span class="badge ${r['상태'].includes('보유')?'badge-hold':'badge-sold'}">${r['상태']}</span></td>
      </tr>`).join('');
    return `<div class="month-group">
      <div class="month-header" onclick="this.nextElementSibling.classList.toggle('open')"><strong>${m}</strong> <span>▼</span></div>
      <div class="month-body"><table class="tbl"><thead><tr><th>종목</th><th>시장</th><th>매수일</th><th>평단가</th><th>수량</th><th>매수금액</th><th>손익</th><th>상태</th></tr></thead><tbody>${tBody}</tbody></table></div>
    </div>`;
  }).join('');
}

async function run() {
  document.getElementById('sDot').style.background = '#f59e0b';
  try {
    const [trades, cash] = await Promise.all([parseCsv(TRADE_CSV), parseCsv(CASH_CSV)]);
    const cashKRW = nv(cash.find(r => r['구분'] === '원화')?.['금액']);
    const cashUSD = nv(cash.find(r => r['구분'] === '달러')?.['금액']);
    const usdRate = nv(cash.find(r => r['구분'] === '환율')?.['금액']) || 1400;
    render(trades, cashKRW, cashUSD, usdRate);
    document.getElementById('sDot').style.background = '#16a34a';
    document.getElementById('sTxt').textContent = '연동 완료';
    document.getElementById('lastUpdate').textContent = '최근 업데이트: ' + new Date().toLocaleString();
  } catch (e) {
    document.getElementById('sTxt').textContent = '연결 오류';
  }
}
run();
</script>
</body>
</html>
