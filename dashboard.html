<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>WONNY Portfolio Insight</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  /* Base Reset & Variables */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
    background: #f8fafc; 
    color: #1e293b; 
    padding: 2rem; 
    min-height: 100vh;
    line-height: 1.5;
  }

  /* Typography */
  h1 { font-size: 26px; font-weight: 700; color: #0f172a; margin-bottom: 6px; letter-spacing: -0.02em; }
  .subtitle { font-size: 14px; color: #64748b; margin-bottom: 2rem; }

  /* Status Bar */
  .status-bar { 
    display: flex; align-items: center; gap: 10px; 
    margin-bottom: 1.5rem; padding: 12px 20px; 
    background: #fff; 
    border: 1px solid #e2e8f0; 
    border-radius: 12px; 
    font-size: 13px; color: #64748b; 
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .refresh-btn { 
    margin-left: auto; background: #0066ff; border: none; color: #fff; 
    padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; 
    cursor: pointer; transition: all 0.2s ease;
  }
  .refresh-btn:hover { background: #0052cc; transform: translateY(-1px); }

  /* Metric Cards */
  .metric-grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 2rem; }
  .metric { 
    background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 20px; 
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); transition: transform 0.2s;
  }
  .metric.highlight { border: 2px solid #0066ff; background: #f0f7ff; }
  .metric-label { font-size: 11px; font-weight: 700; color: #64748b; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .metric-value { font-size: 22px; font-weight: 700; color: #0f172a; font-family: 'Inter', sans-serif; letter-spacing: -0.03em; }
  .metric-sub { font-size: 12px; color: #94a3b8; margin-top: 4px; }
  
  .pos { color: #16a34a !important; } 
  .neg { color: #dc2626 !important; }

  /* Charts */
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 2rem; }
  .card, .card-full { background: #fff; border: 1px solid #e2e8f0; border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
  .card-title { font-size: 15px; font-weight: 700; color: #0f172a; margin-bottom: 20px; }
  
  .legend-row { display: flex; gap: 16px; margin-bottom: 15px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #64748b; font-weight: 500; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  /* Table & Accordion */
  .tbl { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 800px; }
  .tbl th { font-size: 11px; font-weight: 600; color: #64748b; text-align: left; padding: 12px; border-bottom: 2px solid #f1f5f9; text-transform: uppercase; }
  .tbl td { padding: 14px 12px; border-bottom: 1px solid #f1f5f9; color: #334155; font-family: 'Inter', sans-serif; }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl tbody tr:hover { background: #f8fafc; }
  .tbl .name { color: #0f172a; font-weight: 600; font-family: 'Pretendard', sans-serif; }

  .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 6px; }
  .badge-kr { background: #eff6ff; color: #0066ff; }
  .badge-us { background: #f1f5f9; color: #475569; }
  .badge-hold { background: #ecfdf5; color: #059669; }
  .badge-sold { background: #f8fafc; color: #94a3b8; border: 1px solid #e2e8f0; }

  .month-group { margin-bottom: 12px; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; background: #fff; }
  .month-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; cursor: pointer; transition: background 0.2s; }
  .month-header:hover { background: #f8fafc; }
  .month-header.open { background: #f1f5f9; border-bottom: 1px solid #e2e8f0; }
  .month-label { font-size: 15px; font-weight: 700; color: #0f172a; display: flex; align-items: center; gap: 10px; }
  .month-stats { display: flex; align-items: center; gap: 16px; }
  .month-pnl { font-size: 14px; font-weight: 600; }
  .month-arrow { font-size: 12px; color: #94a3b8; transition: transform 0.2s; }
  .month-arrow.open { transform: rotate(180deg); color: #0066ff; }
  .month-body { display: none; }
  .month-body.open { display: block; }

  @media (max-width: 1024px) { .metric-grid-5 { grid-template-columns: repeat(3, 1fr); } .charts-row { grid-template-columns: 1fr; } }
  @media (max-width: 768px) { body { padding: 1rem; } .metric-grid-5 { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<h1>WONNY Portfolio Insight</h1>
<p class="subtitle" id="lastUpdate">데이터를 불러오는 중입니다...</p>

<div class="status-bar">
  <div class="status-dot" style="background:#e2e8f0;" id="sDot"></div>
  <span id="sTxt">구글 시트 연결 중...</span>
  <button class="refresh-btn" onclick="run()">데이터 새로고침</button>
</div>

<div class="metric-grid-5">
  <div class="metric highlight"><div class="metric-label">총 자산</div><div class="metric-value" id="m-assets">—</div><div class="metric-sub" id="m-assets-sub">투자 + 현금 합계</div></div>
  <div class="metric"><div class="metric-label">총 투자금액</div><div class="metric-value" id="m-total">—</div><div class="metric-sub" id="m-hold">보유 종목 현황</div></div>
  <div class="metric"><div class="metric-label">보유 현금</div><div class="metric-value" id="m-cash">—</div><div class="metric-sub" id="m-cash-sub">원화 및 달러</div></div>
  <div class="metric"><div class="metric-label">실현 손익</div><div class="metric-value" id="m-pnl">—</div><div class="metric-sub" id="m-pct">누적 수익률</div></div>
  <div class="metric"><div class="metric-label">승률</div><div class="metric-value" id="m-win">—</div><div class="metric-sub" id="m-winsub">익절/손절 횟수</div></div>
</div>

<div class="charts-row">
  <div class="card">
    <div class="card-title">보유 종목별 투자금액</div>
    <div class="legend-row">
      <div class="legend-item"><div class="legend-dot" style="background:#0066ff;"></div>국장</div>
      <div class="legend-item"><div class="legend-dot" style="background:#94a3b8;"></div>미장</div>
    </div>
    <div style="position:relative;height:250px;"><canvas id="retChart"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title">자산 구성 비중</div>
    <div id="mktLegend" class="legend-row"></div>
    <div style="position:relative;height:250px;"><canvas id="mktChart"></canvas></div>
  </div>
</div>

<div class="card-full">
  <div class="card-title">매매 내역 상세</div>
  <div id="accordion"></div>
</div>

function parseCsv(url) {
  return new Promise((resolve, reject) => {
    Papa.parse(url+'&t='+Date.now(), {
      download: true, header: true, skipEmptyLines: true,
      complete: r => resolve(r.data),
      error: e => reject(e)
    });
  });
}
