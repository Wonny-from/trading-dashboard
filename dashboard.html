<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wonny 매매일지</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; padding: 2rem; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 6px; color: #111; }
  .subtitle { font-size: 13px; color: #999; margin-bottom: 2rem; }
  .section-label { font-size: 11px; font-weight: 500; color: #999; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 10px; }
  .metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .metric { background: #ebebea; border-radius: 8px; padding: 14px 16px; }
  .metric-label { font-size: 12px; color: #888; margin-bottom: 6px; }
  .metric-value { font-size: 22px; font-weight: 500; color: #111; }
  .metric-sub { font-size: 11px; color: #aaa; margin-top: 4px; }
  .pos { color: #1D9E75; } .neg { color: #D85A30; }
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 1.5rem; }
  .card { background: #fff; border: 0.5px solid #e0e0de; border-radius: 12px; padding: 16px; }
  .card-full { background: #fff; border: 0.5px solid #e0e0de; border-radius: 12px; padding: 16px; margin-bottom: 1.5rem; }
  .card-title { font-size: 13px; font-weight: 500; color: #111; margin-bottom: 14px; }
  .legend-row { display: flex; gap: 14px; margin-bottom: 10px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #888; }
  .legend-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
  .tbl { width: 100%; border-collapse: collapse; font-size: 12px; }
  .tbl th { font-size: 11px; font-weight: 500; color: #999; text-align: left; padding: 6px 10px; border-bottom: 0.5px solid #eee; white-space: nowrap; }
  .tbl td { padding: 8px 10px; border-bottom: 0.5px solid #f3f3f3; color: #333; white-space: nowrap; }
  .tbl tr:last-child td { border-bottom: none; }
  .tbl tbody tr:hover { background: #fafafa; }
  .badge { display: inline-block; font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 20px; }
  .badge-kr { background: #E6F1FB; color: #185FA5; }
  .badge-us { background: #FAEEDA; color: #633806; }
  .badge-hold { background: #EAF3DE; color: #27500A; }
  .badge-sold { background: #F1EFE8; color: #5F5E5A; }
  .status-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 1.5rem; padding: 10px 14px; background: #ebebea; border-radius: 8px; font-size: 12px; color: #888; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .refresh-btn { margin-left: auto; background: transparent; border: 0.5px solid #ccc; color: #888; padding: 4px 12px; border-radius: 6px; font-size: 11px; cursor: pointer; }
  .refresh-btn:hover { background: #e5e5e5; color: #333; }
  @media (max-width: 768px) {
    body { padding: 1rem; }
    .metric-grid { grid-template-columns: repeat(2, 1fr); }
    .charts-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<h1>Wonny 매매일지</h1>
<p class="subtitle" id="lastUpdate">데이터 불러오는 중...</p>

<div class="status-bar">
  <div class="status-dot" style="background:#BA7517;" id="sDot"></div>
  <span id="sTxt">구글 시트 연결 중...</span>
  <button class="refresh-btn" onclick="run()">새로고침</button>
</div>

<p class="section-label">포트폴리오 요약</p>
<div class="metric-grid">
  <div class="metric"><div class="metric-label">총 투자금액</div><div class="metric-value" id="m-total">—</div></div>
  <div class="metric"><div class="metric-label">실현 손익</div><div class="metric-value" id="m-pnl">—</div><div class="metric-sub" id="m-pct"></div></div>
  <div class="metric"><div class="metric-label">보유 종목</div><div class="metric-value" id="m-hold">—</div><div class="metric-sub" id="m-mkt"></div></div>
  <div class="metric"><div class="metric-label">승률</div><div class="metric-value" id="m-win">—</div><div class="metric-sub" id="m-winsub"></div></div>
</div>

<div class="charts-row">
  <div class="card">
    <div class="card-title">종목별 투자금액</div>
    <div class="legend-row">
      <div class="legend-item"><div class="legend-dot" style="background:#378ADD;"></div>국장</div>
      <div class="legend-item"><div class="legend-dot" style="background:#EF9F27;"></div>미장</div>
    </div>
    <div style="position:relative;height:220px;"><canvas id="retChart"></canvas></div>
  </div>
  <div class="card">
    <div class="card-title">국장 / 미장 비중</div>
    <div id="mktLegend" class="legend-row"></div>
    <div style="position:relative;height:220px;"><canvas id="mktChart"></canvas></div>
  </div>
</div>

<div class="card-full">
  <div class="card-title">매매 내역</div>
  <div style="overflow-x:auto;">
    <table class="tbl">
      <thead><tr>
        <th>종목</th><th>시장</th><th>매수일</th><th>매수가</th><th>수량</th>
        <th>매수금액</th><th>매도일</th><th>손익</th><th>수익률</th><th>상태</th>
      </tr></thead>
      <tbody id="tbody"><tr><td colspan="10" style="text-align:center;padding:2rem;color:#bbb;">불러오는 중...</td></tr></tbody>
    </table>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRgDk4qNXL-ByfHEPG7pwnK8Zz96-IPU5GlC0D_kFipnAkKiBtSIvyQsnZWZ0uofAA51iqxOCsZ2-_W/pub?gid=512959016&single=true&output=csv';

const fmtA = v => { const x=Number(v); return (isNaN(x)||v===''||v===null)?'—':Math.round(x).toLocaleString('ko-KR')+'원'; };
const fmtW = v => { const x=Number(v); return (isNaN(x)||v===''||v===null)?'—':(x>=0?'+':'')+Math.round(x).toLocaleString('ko-KR')+'원'; };
const fmtP = v => { const x=Number(v); return (isNaN(x)||v===''||v===null)?'—':(x>=0?'+':'')+x.toFixed(2)+'%'; };
const fmtPr = (v,mkt) => { const x=Number(v); return (!v||isNaN(x))?'—':mkt==='미장'?'$'+x.toFixed(2):x.toLocaleString('ko-KR')+'원'; };
const nv = v => (v===null||v===undefined||v==='')?null:Number(v);

let rChart, mChart;

function render(rows) {
  document.getElementById('sDot').style.background = '#1D9E75';
  document.getElementById('sTxt').textContent = `연동 완료 · ${rows.length}건`;
  document.getElementById('lastUpdate').textContent = `마지막 업데이트: ${new Date().toLocaleString('ko-KR')}`;

  const holding = rows.filter(r=>String(r['상태']||'').includes('보유'));
  const withPnl = rows.filter(r=>nv(r['손익(원)'])!==null&&!isNaN(nv(r['손익(원)'])));
  const winners = withPnl.filter(r=>nv(r['손익(원)'])>0);
  const totalInvest = rows.reduce((s,r)=>s+(nv(r['매수금액(원)'])||0),0);
  const totalPnl = withPnl.reduce((s,r)=>s+(nv(r['손익(원)'])||0),0);
  const pct = totalInvest>0?totalPnl/totalInvest*100:0;
  const kr = rows.filter(r=>r['시장']==='국장').length;
  const us = rows.filter(r=>r['시장']==='미장').length;

  document.getElementById('m-total').textContent = fmtA(totalInvest);
  const pEl = document.getElementById('m-pnl');
  pEl.textContent = fmtW(totalPnl);
  pEl.className = 'metric-value '+(totalPnl>=0?'pos':'neg');
  document.getElementById('m-pct').textContent = fmtP(pct)+' 전체';
  document.getElementById('m-hold').textContent = holding.length+'개';
  document.getElementById('m-mkt').textContent = `국장 ${kr} / 미장 ${us}`;
  document.getElementById('m-win').textContent = withPnl.length>0?(winners.length/withPnl.length*100).toFixed(1)+'%':'—';
  document.getElementById('m-winsub').textContent = `${winners.length}승 ${withPnl.length-winners.length}패`;

  const sorted = [...rows].sort((a,b)=>(nv(b['매수금액(원)'])||0)-(nv(a['매수금액(원)'])||0));
  const barColors = sorted.map(r=>r['시장']==='미장'?'#EF9F27':'#378ADD');

  if (rChart) rChart.destroy();
  rChart = new Chart(document.getElementById('retChart'), {
    type:'bar',
    data:{ labels:sorted.map(r=>r['종목']||''), datasets:[{data:sorted.map(r=>nv(r['매수금액(원)'])||0),backgroundColor:barColors,borderRadius:3,borderSkipped:false}]},
    options:{ responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${Math.round(ctx.raw).toLocaleString()}원`}}},
      scales:{
        x:{ticks:{font:{size:10},color:'#aaa',maxRotation:45,autoSkip:false},grid:{display:false},border:{color:'#eee'}},
        y:{ticks:{font:{size:10},color:'#aaa',callback:v=>(v/10000).toFixed(0)+'만'},grid:{color:'rgba(0,0,0,0.05)'},border:{color:'#eee'}}
      }
    }
  });

  const krAmt = rows.filter(r=>r['시장']==='국장').reduce((s,r)=>s+(nv(r['매수금액(원)'])||0),0);
  const usAmt = rows.filter(r=>r['시장']==='미장').reduce((s,r)=>s+(nv(r['매수금액(원)'])||0),0);
  const tot = krAmt+usAmt;
  document.getElementById('mktLegend').innerHTML = [['국장',krAmt,'#378ADD'],['미장',usAmt,'#EF9F27']].map(([l,a,c])=>`<div class="legend-item"><div class="legend-dot" style="background:${c};"></div>${l} ${tot>0?(a/tot*100).toFixed(1):0}%</div>`).join('');

  if (mChart) mChart.destroy();
  mChart = new Chart(document.getElementById('mktChart'), {
    type:'doughnut',
    data:{labels:['국장','미장'],datasets:[{data:[krAmt,usAmt],backgroundColor:['#378ADD','#EF9F27'],borderWidth:0,hoverOffset:4}]},
    options:{ responsive:true, maintainAspectRatio:false, cutout:'65%',
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${Math.round(ctx.raw).toLocaleString()}원`}}}
    }
  });

  document.getElementById('tbody').innerHTML = rows.map(r=>{
    const mkt=r['시장']||''; const state=String(r['상태']||'');
    const pv=nv(r['수익률(%)']); const pnlv=nv(r['손익(원)']);
    const rCls=pv===null||isNaN(pv)?'':pv>0?'pos':pv<0?'neg':'';
    const pCls=pnlv===null||isNaN(pnlv)?'':pnlv>0?'pos':pnlv<0?'neg':'';
    return `<tr>
      <td style="font-weight:500;color:#111;">${r['종목']||'—'}</td>
      <td><span class="badge ${mkt==='미장'?'badge-us':'badge-kr'}">${mkt||'—'}</span></td>
      <td style="color:#aaa;font-size:11px;">${r['매수일']||'—'}</td>
      <td>${fmtPr(r['매수가'],mkt)}</td>
      <td style="color:#aaa;">${r['수량']||'—'}</td>
      <td>${fmtA(r['매수금액(원)'])}</td>
      <td style="color:#aaa;font-size:11px;">${r['매도일']||'—'}</td>
      <td class="${pCls}">${pnlv!==null&&!isNaN(pnlv)?fmtW(pnlv):'—'}</td>
      <td class="${rCls}">${pv!==null&&!isNaN(pv)?fmtP(pv):'—'}</td>
      <td><span class="badge ${state.includes('보유')?'badge-hold':'badge-sold'}">${state||'—'}</span></td>
    </tr>`;
  }).join('');
}

function run() {
  document.getElementById('sDot').style.background = '#BA7517';
  document.getElementById('sTxt').textContent = '구글 시트 연결 중...';
  Papa.parse(CSV_URL+'&t='+Date.now(), {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: res => {
      if (res.data && res.data.length > 0) render(res.data);
      else {
        document.getElementById('sDot').style.background = '#D85A30';
        document.getElementById('sTxt').textContent = '데이터가 없습니다';
      }
    },
    error: e => {
      document.getElementById('sDot').style.background = '#D85A30';
      document.getElementById('sTxt').textContent = '오류: ' + e.message;
    }
  });
}

run();
</script>
</body>
</html>
